{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Lost and Found{% endblock %}</title>

    <!--<script src="{% static 'project/js/base.js' %}"></script>-->
    <!-- <link rel="stylesheet" href="{% static 'project/css/base.css' %}"> -->
</head>
<body>
    <header>
        <div class="header">
            <a class="header" href="/">Lost and Found</a>
            {% if user.is_authenticated %}
                <a class="profile" href="{% url 'myposts' %}">{{ profile.name }}</a>
            {% else %}
                <a class="login" href="{% url 'login' %}">Login</a>
            {% endif %}
            {% block header %}
            {% endblock %}
        </div>
    </header>
    <main>
        {% block main %}
        {% endblock %}
    </main>
    <footer>
        {% block footer %}
        {% endblock %}
    </footer>
</body>
</html>
