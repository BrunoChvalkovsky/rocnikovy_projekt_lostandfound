{% extends 'project/base.html' %}
{% load static %}

{% block head %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'project/css/forms.css' %}">
{% endblock %}

{% block header %}
{% endblock %}

{% block main %}
    <h2>Login</h2>
    <form method="POST">
        {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        {% if error %}
            <p>{{ error }}</p>
        {% endif %}
    </form>
{% endblock %}
{% block footer %}
{% endblock %}
